name: Keep Render App Alive

on:
  schedule:
    # Run every 14 minutes to prevent Render Free Tier from sleeping (which happens after 15 mins)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Application Health Endpoint
        run: |
          HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://legal-ai-agent.coach.io.vn/v1/health)
          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "Successfully pinged the application. HTTP Status: $HTTP_STATUS"
          else
            echo "Warning: Application ping returned HTTP Status $HTTP_STATUS"
          fi
