name: 🔄 Sync Legal Docs from Google Drive

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync-legal-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4.2.2

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            pymupdf

      - name: 📂 Run sync script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          LEGAL_FOLDER_ID: ${{ secrets.LEGAL_FOLDER_ID }}
        run: python scripts/sync_from_drive.py

      - name: 📤 Commit & push new docs
        run: |
          git config --global user.name "LegalAI Bot"
          git config --global user.email "bot@legalai.vn"
          git add data/ || true
          git diff --staged --quiet || git commit -m "🔄 Auto-sync legal docs $(date +'%Y-%m-%d %H:%M')"
          git push || true
