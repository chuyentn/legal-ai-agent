services:
  - type: web
    name: legal-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    envVars:
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_OAUTH_TOKEN
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL_MODE
        sync: false
      - key: DB_USER
        sync: false
      - key: API_KEY_SECRET
        sync: false
      - key: LLM_ENCRYPTION_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_DB_HOST
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      - key: SUPABASE_DB_PORT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
